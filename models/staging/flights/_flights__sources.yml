sources:
  - name: demo_src
    description: Данные из БД авиаперелётов
    tables:
      - name: aircrafts
        description: Модели самолётов
        columns:
          - name: aircraft_code
            description: Код модели самолёта
          - name: model
            description: Название модели самолёта
          - name: "range"
            description: Неизвестное поле
      - name: airports
        description: Аэропорты
        columns:
          - name: airport_code
            description: Код аэропорта
          - name: airport_name
            description: Название аэропорта
          - name: city
            description: Город
          - name: coordinates
            description: Координаты
          - name: timezone
            description: Временная зона
      - name: seats
        description: Посадочные места
        columns:
          - name: "aircraft_code"
            description: Код модели самолёта
          - name: "seat_no"
            description: Номер посадочного места
          - name: "fare_conditions"
            description: Класс комфорта
      - name: bookings
        description: Посадочные места
        columns:
          - name: book_ref
            description: Неизвестное поле
          - name: book_date
            description: Дата бронирования
          - name: total_amount
            description: Сумма
        freshness:
          warn_after:
            count: 60000000
            period: hour
          error_after:
            count: 10000000
            period: day
          filter: current_timestamp::date - book_date::date < 300000000000
        loaded_at_field: book_date::timestamp
